<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukesplan Mat</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #fff0f5;
  }
  header {
    background-color: #ff66b2;
    color: white;
    text-align: center;
    padding: 1rem;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  main {
    padding: 1rem;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    border: 1px solid #ffb3d9;
    padding: 0.3rem;
    text-align: center;
    min-width: 100px;
    vertical-align: top;
  }
  th {
    background-color: #ff66b2;
    color: white;
  }
  td {
    background-color: #ffe6f0;
  }
  td textarea {
    width: 100%;
    height: 2.5rem;
    border: none;
    background: transparent;
    resize: vertical;
    font-size: 0.9rem;
    text-align: center;
    outline: none;
    padding: 0.2rem;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  td textarea:focus {
    background-color: #ffcce6;
    border-radius: 5px;
  }
  @media(min-width: 600px) {
    table { min-width: 700px; }
  }
</style>
</head>
<body>
<header>
  <h1>Ukesplan Mat</h1>
</header>
<main>
  <table>
    <thead>
      <tr>
        <th>Måltid</th>
        <th>Mandag</th>
        <th>Tirsdag</th>
        <th>Onsdag</th>
        <th>Torsdag</th>
        <th>Fredag</th>
        <th>Lørdag</th>
        <th>Søndag</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>Lunsj</td><td><textarea data-day="mandag" data-meal="Lunsj"></textarea></td><td><textarea data-day="tirsdag" data-meal="Lunsj"></textarea></td><td><textarea data-day="onsdag" data-meal="Lunsj"></textarea></td><td><textarea data-day="torsdag" data-meal="Lunsj"></textarea></td><td><textarea data-day="fredag" data-meal="Lunsj"></textarea></td><td><textarea data-day="lørdag" data-meal="Lunsj"></textarea></td><td><textarea data-day="søndag" data-meal="Lunsj"></textarea></td></tr>
      <tr><td>Middag</td><td><textarea data-day="mandag" data-meal="Middag"></textarea></td><td><textarea data-day="tirsdag" data-meal="Middag"></textarea></td><td><textarea data-day="onsdag" data-meal="Middag"></textarea></td><td><textarea data-day="torsdag" data-meal="Middag"></textarea></td><td><textarea data-day="fredag" data-meal="Middag"></textarea></td><td><textarea data-day="lørdag" data-meal="Middag"></textarea></td><td><textarea data-day="søndag" data-meal="Middag"></textarea></td></tr>
      <tr><td>Kvelds</td><td><textarea data-day="mandag" data-meal="Kvelds"></textarea></td><td><textarea data-day="tirsdag" data-meal="Kvelds"></textarea></td><td><textarea data-day="onsdag" data-meal="Kvelds"></textarea></td><td><textarea data-day="torsdag" data-meal="Kvelds"></textarea></td><td><textarea data-day="fredag" data-meal="Kvelds"></textarea></td><td><textarea data-day="lørdag" data-meal="Kvelds"></textarea></td><td><textarea data-day="søndag" data-meal="Kvelds"></textarea></td></tr>
      <tr><td>Mellommåltid</td><td><textarea data-day="mandag" data-meal="Mellommåltid"></textarea></td><td><textarea data-day="tirsdag" data-meal="Mellommåltid"></textarea></td><td><textarea data-day="onsdag" data-meal="Mellommåltid"></textarea></td><td><textarea data-day="torsdag" data-meal="Mellommåltid"></textarea></td><td><textarea data-day="fredag" data-meal="Mellommåltid"></textarea></td><td><textarea data-day="lørdag" data-meal="Mellommåltid"></textarea></td><td><textarea data-day="søndag" data-meal="Mellommåltid"></textarea></td></tr>
    </tbody>
  </table>
</main>

<script>
const textareas = document.querySelectorAll("td textarea");
textareas.forEach(area => {
  const key = area.dataset.day + "-" + area.dataset.meal;
  const saved = localStorage.getItem(key);
  if(saved) area.value = saved;
  area.addEventListener("input", () => localStorage.setItem(key, area.value));
});
</script>
</body>
</html>
